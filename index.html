<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Tracker</title>
    <link rel="stylesheet" href="https://cdn.staticfile.net/leaflet/1.9.4/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container app-shell">
        
        <!-- HOME 视图 -->
        <div id="view-home" class="view-section">
            <section class="hero card">
                <div class="hero-copy">
                    <p class="eyebrow">Virtual Ride Prototype</p>
                    <h1>Rider Tracker 🚴‍♂️</h1>
                    <p class="hero-text">轻量级Web虚拟骑行项目。请在下方配置基础数据，或选择进入功能模块。</p>
                    <div class="controls mode-controls">
                        <button onclick="window.location.href='simulation.html'" class="btn primary">运行模拟</button>
                        <button onclick="window.location.href='live.html'" class="btn secondary">开始虚拟骑行</button>
                    </div>
                </div>
                <div class="hero-metrics">
                    <div class="metric-chip">
                        <span>路线距离</span>
                        <strong id="routeDistanceChip">0.00 km</strong>
                    </div>
                    <div class="metric-chip">
                        <span>累计爬升</span>
                        <strong id="routeElevationChip">0 m</strong>
                    </div>
                    <div class="metric-chip">
                        <span>最近模拟</span>
                        <strong id="savedSessionChip">未保存</strong>
                    </div>
                </div>
            </section>

            <section class="layout-grid">
                <div class="column">
                    <div class="card">
                        <div class="section-title-row">
                            <div>
                                <h2>个人基础数据</h2>
                                <p class="section-subtitle">物理模型与功率计算的基础参数。</p>
                            </div>
                        </div>
                        <form id="personalSettingsForm" class="form-grid">
                            <label class="field"><span>骑手总质量 kg</span><input id="massInput" name="mass" type="number" min="40" max="150" step="1"></label>
                            <label class="field"><span>FTP W</span><input id="ftpInput" name="ftp" type="number" min="100" max="450" step="5"></label>
                            <label class="field"><span>静息心率 bpm</span><input id="restingHrInput" name="restingHr" type="number" min="40" max="100" step="1"></label>
                            <label class="field"><span>最高心率 bpm</span><input id="maxHrInput" name="maxHr" type="number" min="120" max="220" step="1"></label>
                            <label class="field"><span>空气阻力 CdA</span><input id="cdaInput" name="cda" type="number" min="0.2" max="0.8" step="0.01"></label>
                            <label class="field"><span>滚阻 Crr</span><input id="crrInput" name="crr" type="number" min="0.001" max="0.02" step="0.001"></label>
                            <label class="field"><span>风速 m/s</span><input id="windSpeedInput" name="windSpeed" type="number" min="-10" max="10" step="0.5"></label>
                        </form>
                    </div>
                </div>
                <div class="column">
                    <div class="card">
                        <div class="section-title-row">
                            <div>
                                <h2>历史骑行记录</h2>
                                <p class="section-subtitle">最近一次的会话摘要。</p>
                            </div>
                        </div>
                        <div id="historyContainer" class="route-summary">
                            暂无历史记录。
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="https://cdn.staticfile.net/leaflet/1.9.4/leaflet.js"></script>
    <script type="module" src="src/app/bootstrap.js"></script>
</body>
</html>
